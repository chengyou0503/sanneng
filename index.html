<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>三能國際 線上訂購</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #007bff; --bg: #f9fafb; --card-bg: #ffffff; --radius: 0.5rem; --gap: 1rem; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100vh; background: var(--bg); font-family: 'Noto Sans TC', sans-serif; }
    body { display: flex; justify-content: center; align-items: center; padding: var(--gap); }
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 800px; padding: var(--gap); }
    .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; text-align: center; }
    .hidden { display: none !important; }
    .logo { display: block; margin: 0 auto var(--gap); max-width: 250px; }
    h2 { text-align: center; color: var(--primary); margin-bottom: var(--gap); }
    form { display: flex; flex-direction: column; gap: var(--gap); }
    input, select, textarea { width: 100%; padding: 0.75rem; font-size: 1rem; border: 1px solid #d1d5db; border-radius: var(--radius); font-family: 'Noto Sans TC', sans-serif;}
    #itemsContainer { display: flex; flex-wrap: wrap; gap: var(--gap); }
    .item-option { background: #fff; border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 0.5rem; padding: 0.75rem; flex: 1 1 calc(50% - var(--gap)); cursor: pointer; }
    .qty-control { display: flex; align-items: center; }
    .qty-control input { width: 50px; text-align: center; border-radius: var(--radius); margin: 0 0.25rem; padding: 0.25rem; }
    .qty-control button { background: #e5e7eb; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 1.2rem; cursor: pointer; }
    .submit-btn { background: var(--primary); color: #fff; border: none; padding: 0.8rem; font-size: 1.1rem; border-radius: var(--radius); cursor: pointer; }
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
    .modal.active { display: flex; justify-content: center; align-items: center; }
    .modal-content { background-color: #fefefe; padding: 20px; width: 90%; max-width: 500px; border-radius: var(--radius); }
    .modal-body { max-height: 60vh; overflow-y: auto; }
    .modal-footer { margin-top: 1rem; text-align: right; }
    .btn-confirm { background-color: var(--primary); color: white; padding: 0.5rem 1rem; border: none; border-radius: var(--radius); }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <p>正在與 LINE 連線...</p>
    <p id="loadingError" style="color: red; margin-top: 1rem; font-size: 0.9rem; max-width: 90%;"></p>
  </div>
  
  <div id="app" class="card hidden">
    <img src="logo.png" alt="Logo" class="logo"/>
    <h2>三能國際 線上訂購</h2>
    <p id="welcomeMsg" style="text-align: center; margin-bottom: 1rem;"></p>
    <form id="orderForm">
      <label>訂購人/店家名稱: <input id="name" required /></label>
      <label>電話 (選填): <input id="phone" /></label>
      <label>選擇類別: <select id="category" disabled><option>載入中...</option></select></label>
      <label>備註 (選填): <textarea id="remarks"></textarea></label>
      <div id="itemsContainer"></div>
      <button class="submit-btn" type="submit">確認訂單</button>
    </form>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-content">
      <h3>請確認您的訂單</h3>
      <div id="confirmList" class="modal-body"></div>
      <div class="modal-footer">
        <button type="button" onclick="document.getElementById('confirmModal').classList.remove('active')">取消</button>
        <button type="button" class="btn-confirm">確認送出</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbws-2tzD8GqSjAB7s-JygRiKTDReYTPDsmZV5LTHBGSWpna7OsyaCEsSX14WY9LxWJLbA/exec';
    const LINE_LOGIN_CLIENT_ID = '2008189875';

    let currentUser = null;
    const pending = {};

    const nameEl = document.getElementById('name');
    const welcomeMsgEl = document.getElementById('welcomeMsg');
    const categoryEl = document.getElementById('category');
    const itemsContainerEl = document.getElementById('itemsContainer');
    const loadingOverlayEl = document.getElementById('loadingOverlay');
    const loadingErrorEl = document.getElementById('loadingError');
    const appEl = document.getElementById('app');
    const orderFormEl = document.getElementById('orderForm');

    async function apiCall(action, method = 'GET', body = null) {
      const url = method === 'POST' ? API_URL : `${API_URL}?action=${action}&${new URLSearchParams(body || {})}`;
      try {
        const res = await fetch(url, {
          method,
          mode: 'cors',
          headers: method === 'POST' ? { 'Content-Type': 'text/plain;charset=UTF-8' } : {},
          body: method === 'POST' ? JSON.stringify({ action, ...body }) : null
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        return data;
      } catch (error) {
        console.error(`API Call Failed [${action}]:`, error);
        throw error;
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (API_URL.includes('YOUR_UNIQUE_WEB_APP_URL')) {
        loadingErrorEl.textContent = '錯誤：前端尚未設定後端 API_URL！';
        return;
      }
      
      const params = new URLSearchParams(window.location.search);
      if (params.has('error')) {
        loadingErrorEl.textContent = `LINE 登入失敗：${params.get('error_description')}`;
        return;
      }

      if (params.has('code')) {
        loadingOverlayEl.querySelector('p').textContent = '身份驗證成功，正在載入資料...';
        try {
          const { profile } = await apiCall('handleLineLogin', 'POST', { code: params.get('code') });
          currentUser = profile;
          window.history.replaceState({}, document.title, window.location.pathname);
          await main();
        } catch (err) {
          loadingErrorEl.textContent = `LINE 驗證失敗: ${err.message}`;
        }
      } else {
        const state = Date.now();
        const redirectUri = window.location.href.split('?')[0];
        window.location.href = `https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${LINE_LOGIN_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&scope=profile%20openid&state=${state}`;
      }
    });

    async function main() {
      loadingOverlayEl.classList.add('hidden');
      appEl.classList.remove('hidden');
      welcomeMsgEl.innerHTML = `歡迎, <strong>${currentUser.displayName}</strong>！`;
      nameEl.value = currentUser.displayName;
      
      orderFormEl.addEventListener('submit', showConfirmModal);
      categoryEl.addEventListener('change', () => loadItems(categoryEl.value));
      document.querySelector('.btn-confirm').addEventListener('click', submitOrder);

      try {
        const { categories } = await apiCall('getInitialData');
        categoryEl.innerHTML = '<option value="">請選擇類別</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('');
        categoryEl.disabled = false;
      } catch (err) {
        alert(`載入商品類別失敗: ${err.message}`);
      }
    }

    async function loadItems(cat) {
      itemsContainerEl.innerHTML = cat ? '載入中...' : '';
      if (!cat) return;
      try {
        const items = await apiCall('getItemsByCategory', 'GET', { cat });
        itemsContainerEl.innerHTML = '';
        items.forEach(item => {
          const itemState = pending[item.item] || { qty: 0 };
          const div = document.createElement('div');
          div.className = 'item-option';
          div.innerHTML = `
            <input type="checkbox" ${itemState.qty > 0 ? 'checked' : ''} style="transform: scale(1.5);">
            <div>${item.item} (${item.unit})<br><span style="color:var(--primary);font-weight:bold;">NT$ ${item.price}</span></div>
            <div class="qty-control">
              <button type="button" class="qty-minus">−</button>
              <input type="number" min="0" value="${itemState.qty}">
              <button type="button" class="qty-plus">＋</button>
            </div>`;
          itemsContainerEl.appendChild(div);

          const qtyInput = div.querySelector('input[type="number"]');
          const checkbox = div.querySelector('input[type="checkbox"]');
          
          const update = (newQty) => {
            const qty = Math.max(0, parseInt(newQty, 10) || 0);
            qtyInput.value = qty;
            checkbox.checked = qty > 0;
            if (qty > 0) pending[item.item] = { ...item, qty };
            else delete pending[item.item];
          };

          div.querySelector('.qty-plus').onclick = () => update(qtyInput.valueAsNumber + 1);
          div.querySelector('.qty-minus').onclick = () => update(qtyInput.valueAsNumber - 1);
          qtyInput.oninput = () => update(qtyInput.value);
          checkbox.onchange = () => update(checkbox.checked ? 1 : 0);
          div.onclick = (e) => {
              if (e.target.tagName !== 'DIV') return;
              update(checkbox.checked ? 0 : 1);
          };
        });
      } catch (err) {
        itemsContainerEl.innerHTML = `載入品項失敗: ${err.message}`;
      }
    }

    function showConfirmModal(e) {
      e.preventDefault();
      if (Object.keys(pending).length === 0) return alert('請至少選擇一個品項！');
      
      const confirmList = document.getElementById('confirmList');
      confirmList.innerHTML = Object.values(pending).map(p => `<div>${p.item} x ${p.qty}</div>`).join('');
      document.getElementById('confirmModal').classList.add('active');
    }

    async function submitOrder() {
      const btn = document.querySelector('.btn-confirm');
      btn.disabled = true;
      btn.textContent = '送出中…';
      
      try {
        const payload = {
          name: nameEl.value.trim(),
          phone: document.getElementById('phone').value.trim(),
          remarks: document.getElementById('remarks').value.trim(),
          orders: Object.values(pending),
          user: currentUser
        };
        const res = await apiCall('submitOrder', 'POST', payload);
        alert(`訂單已成功送出！總金額：${res.total} 元`);
        
        orderFormEl.reset();
        nameEl.value = currentUser.displayName;
        itemsContainerEl.innerHTML = '';
        categoryEl.selectedIndex = 0;
        Object.keys(pending).forEach(key => delete pending[key]);
      } catch (err) {
        alert(`送出訂單失敗: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.textContent = '確認送出';
        document.getElementById('confirmModal').classList.remove('active');
      }
    }
  </script>
</body>
</html>
